# markdownlint-cli2 config. Keep this tight — the repo is mostly prose.
# Run via: just lint

default: true

# MD013: line length. Repo convention is soft-wrap at clause boundary
# (~80 cols), but tables and long links blow past it. Disable.
MD013: false

# MD033: inline HTML. We use <details>/<summary> and template comments.
MD033:
  allowed_elements:
    - details
    - summary
    - br
    - sub
    - sup
    - img
    - a
    - kbd
    - title
    - body
    - t
    - p

# MD024: duplicate headings allowed if in different sections.
MD024:
  siblings_only: true

# MD041: first line must be a top-level heading. Templates start with
# HTML comments; relax.
MD041: false

# MD046: code fence style — always fenced (not indented).
MD046:
  style: fenced

# MD040: fenced code blocks must declare a language. Use `text` when no
# language applies. This is enforced; diagnostics already surface it.
MD040: true
